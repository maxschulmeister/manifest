name: Sync main with upstream

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Mirror upstream/main to origin/main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/mnfst/manifest.git

      - name: Fetch main branches
        run: |
          git fetch origin main
          git fetch upstream main

      - name: Check whether main is already synced
        id: check
        run: |
          ORIGIN_MAIN=$(git rev-parse origin/main)
          UPSTREAM_MAIN=$(git rev-parse upstream/main)

          echo "origin/main:   $ORIGIN_MAIN"
          echo "upstream/main: $UPSTREAM_MAIN"

          if [ "$ORIGIN_MAIN" = "$UPSTREAM_MAIN" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "origin/main already matches upstream/main."
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Force-sync origin/main to upstream/main
        if: steps.check.outputs.has_updates == 'true'
        run: |
          EXPECTED_ORIGIN_MAIN=$(git rev-parse origin/main)
          git push origin upstream/main:refs/heads/main --force-with-lease=refs/heads/main:$EXPECTED_ORIGIN_MAIN
