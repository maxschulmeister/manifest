name: Sync with upstream

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-with-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync main and staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add source https://github.com/mnfst/manifest.git
          git fetch source main
          git fetch origin main staging

      - name: Mirror main exactly from upstream
        run: |
          git checkout -B main origin/main
          git reset --hard source/main
          git push --force-with-lease origin main

      - name: Merge upstream main into staging
        run: |
          git checkout -B staging origin/staging
          git merge -X theirs source/main --no-edit
          git push origin staging
